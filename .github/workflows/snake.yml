name: Generate Snake Animation

on:
  # Runs every day at midnight UTC so the snake stays current
  schedule:
    - cron: "0 0 * * *"
  # Lets you trigger it manually from the Actions tab
  workflow_dispatch:
  # Regenerates whenever you push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake.gif?color_snake=#6C8EBF&color_dots=#1e2327,#334155,#475569,#8E7CC3,#6C8EBF

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
